<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Generate Favicon</title>
</head>
<body>
    <h1>Generate Favicon</h1>
    <p>Open this page in browser to generate favicon.ico</p>
    <canvas id="canvas" width="512" height="512"></canvas>
    <button onclick="generateFavicon()">Generate & Download</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Draw favicon
        function drawFavicon() {
            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, 512, 512);
            gradient.addColorStop(0, '#4f46e5');
            gradient.addColorStop(1, '#06b6d4');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 512, 512);
            
            // Draw wrench (simplified)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(280, 200, 80, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#4f46e5';
            ctx.beginPath();
            ctx.arc(280, 200, 45, 0, Math.PI * 2);
            ctx.fill();
            
            // Wrench handle
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(220, 180, 60, 180);
            
            // Spark/star
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.moveTo(100, 100);
            ctx.lineTo(110, 140);
            ctx.lineTo(150, 140);
            ctx.lineTo(120, 165);
            ctx.lineTo(130, 205);
            ctx.lineTo(100, 180);
            ctx.lineTo(70, 205);
            ctx.lineTo(80, 165);
            ctx.lineTo(50, 140);
            ctx.lineTo(90, 140);
            ctx.closePath();
            ctx.fill();
        }
        
        function generateFavicon() {
            drawFavicon();
            
            // Convert to ICO format (simplified - just PNG with .ico extension)
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'favicon.ico';
                a.click();
                URL.revokeObjectURL(url);
            }, 'image/x-icon');
        }
        
        // Auto-draw on load
        drawFavicon();
    </script>
</body>
</html>
