<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Match - Діагностика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .card h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status.ok {
            background: #10b981;
        }
        .status.error {
            background: #ef4444;
        }
        .status.warning {
            background: #f59e0b;
        }
        .info-grid {
            display: grid;
            gap: 10px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        .info-label {
            color: #94a3b8;
        }
        .info-value {
            font-weight: 600;
        }
        .table-list {
            display: grid;
            gap: 8px;
        }
        .table-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }
        .table-name {
            font-weight: 600;
        }
        .table-count {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            border-radius: 8px;
            padding: 15px;
            color: #fca5a5;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .refresh-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .refresh-btn:hover {
            transform: scale(1.02);
        }
        .refresh-btn:active {
            transform: scale(0.98);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
        .timestamp {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 20px;
        }
        .home-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
        .home-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Cyber-Match Діагностика</h1>
        
        <div id="content">
            <div class="loading">Завантаження...</div>
        </div>
        
        <button class="refresh-btn" onclick="loadDiagnostics()">🔄 Оновити</button>
        
        <div style="text-align: center;">
            <a href="/" class="home-link">← На головну</a>
        </div>
        
        <p class="timestamp" id="timestamp"></p>
    </div>

    <script>
        async function loadDiagnostics() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Завантаження...</div>';
            
            try {
                const response = await fetch('/api/diagnostics');
                const data = await response.json();
                
                let html = '';
                
                // Environment Variables
                html += `
                    <div class="card">
                        <h2>
                            ⚙️ Змінні оточення
                            <span class="status ${data.env.HAS_DATABASE_URL && data.env.HAS_TELEGRAM_TOKEN ? 'ok' : 'warning'}">
                                ${data.env.HAS_DATABASE_URL && data.env.HAS_TELEGRAM_TOKEN ? 'OK' : 'Частково'}
                            </span>
                        </h2>
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">NODE_ENV</span>
                                <span class="info-value">${data.env.NODE_ENV}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">PORT</span>
                                <span class="info-value">${data.env.PORT}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">DATABASE_URL</span>
                                <span class="info-value">${data.env.HAS_DATABASE_URL ? '✅ Встановлено' : '❌ Не встановлено'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">TELEGRAM_BOT_TOKEN</span>
                                <span class="info-value">${data.env.HAS_TELEGRAM_TOKEN ? '✅ Встановлено' : '❌ Не встановлено'}</span>
                            </div>
                        </div>
                    </div>
                `;
                
                // Database Connection
                const dbStatus = data.database.connected ? 'ok' : 'error';
                const dbStatusText = data.database.connected ? 'Підключено' : 'Не підключено';
                
                html += `
                    <div class="card">
                        <h2>
                            🗄️ База даних
                            <span class="status ${dbStatus}">${dbStatusText}</span>
                        </h2>
                `;
                
                if (data.database.error) {
                    html += `<div class="error-message">${data.database.error}</div>`;
                }
                
                if (data.database.tables && data.database.tables.length > 0) {
                    html += `
                        <div class="table-list" style="margin-top: 15px;">
                            <div class="info-item" style="background: transparent; padding: 0;">
                                <span class="info-label">Таблиці: ${data.database.tables.length}</span>
                                <span class="info-label">Індекси: ${data.database.indexesCount || 0}</span>
                            </div>
                    `;
                    
                    for (const table of data.database.tables) {
                        const count = data.database.counts[table] || 0;
                        html += `
                            <div class="table-item">
                                <span class="table-name">${table}</span>
                                <span class="table-count">${count} записів</span>
                            </div>
                        `;
                    }
                    
                    html += '</div>';
                }
                
                html += '</div>';
                
                content.innerHTML = html;
                document.getElementById('timestamp').textContent = 
                    'Оновлено: ' + new Date(data.timestamp).toLocaleString('uk-UA');
                
            } catch (error) {
                content.innerHTML = `
                    <div class="card">
                        <h2>❌ Помилка</h2>
                        <div class="error-message">${error.message}</div>
                    </div>
                `;
            }
        }
        
        // Load on page load
        loadDiagnostics();
    </script>
</body>
</html>
